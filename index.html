<!DOCTYPE html>
<html>
    <head>
        <title>Messenger</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body { font-family: sans-serif; margin: 20px; }
            #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
            input { width: 70%; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
            button { padding: 10px; border-radius: 5px; background: #007bff; color: white; border: none; }
        </style>
    </head>
    <body>
        <h2>Messenger MVP</h2>
        <div id="messages"></div>
        <input type="text" id="messageText" placeholder="Напиши сообщение..." autocomplete="off"/>
        <button onclick="sendMessage()">Отправить</button>

        <script>
            var client_id = Date.now();
            var ws = new WebSocket(`wss://${window.location.host}/ws/${client_id}`);

            ws.onmessage = function(event) {
                var messages = document.getElementById('messages');
                var message = document.createElement('div');
                message.textContent = event.data;
                messages.appendChild(message);
                messages.scrollTop = messages.scrollHeight;
            };

            function sendMessage() {
                var input = document.getElementById("messageText");
                ws.send(input.value);
                input.value = '';
            }
        </script>
    </body>
</html>
